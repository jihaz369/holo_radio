name: Replace Repository From ZIP

on:
  workflow_dispatch:

  push:
    paths:
      - "*.zip"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Find ZIP file
        id: zip
        shell: bash
        run: |
          ZIP=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP" ]; then
            echo "No ZIP file found!"
            exit 1
          fi

          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          echo "Using ZIP: $ZIP"

      - name: Clean repository
        shell: bash
        env:
          ZIP: ${{ env.ZIP }}
        run: |
          ZIP_NAME=$(basename "$ZIP")

          find . -mindepth 1 \
            ! -path "./.git*" \
            ! -path "./.github*" \
            ! -name "$ZIP_NAME" \
            -exec rm -rf {} +

      - name: Extract ZIP
        shell: bash
        env:
          ZIP: ${{ env.ZIP }}
        run: |
          mkdir extract
          unzip -oq "$ZIP" -d extract

          shopt -s dotglob

          ITEMS=$(find extract -mindepth 1 -maxdepth 1 | wc -l)

          if [ "$ITEMS" -eq 1 ]; then
            FIRST=$(find extract -mindepth 1 -maxdepth 1)

            if [ -d "$FIRST" ]; then
              mv "$FIRST"/* . 2>/dev/null || true
              mv "$FIRST"/.* . 2>/dev/null || true
            else
              mv extract/* . 2>/dev/null || true
              mv extract/.* . 2>/dev/null || true
            fi
          else
            mv extract/* . 2>/dev/null || true
            mv extract/.* . 2>/dev/null || true
          fi

          rm -rf extract
          rm -f "$ZIP"

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "Replace repository from ZIP"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
