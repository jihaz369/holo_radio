name: Build Flutter APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find Flutter project
        id: find
        run: |
          PROJECT_DIR=$(find . -name pubspec.yaml | head -n 1 | xargs dirname)

          if [ -z "$PROJECT_DIR" ]; then
            echo "No Flutter project found!"
            exit 1
          fi

          echo "Flutter project: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Get dependencies
        working-directory: ${{ steps.find.outputs.project_dir }}
        run: flutter pub get

      - name: Analyze project
        working-directory: ${{ steps.find.outputs.project_dir }}
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        working-directory: ${{ steps.find.outputs.project_dir }}
        run: flutter test
        continue-on-error: true

      - name: Build Release APK
        working-directory: ${{ steps.find.outputs.project_dir }}
        run: flutter build apk --release

      - name: Locate APK
        id: apk
        run: |
          APK=$(find . -path "*/build/app/outputs/flutter-apk/*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "APK not found!"
            exit 1
          fi

          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Flutter-Release-APK
          path: ${{ steps.apk.outputs.apk }}
