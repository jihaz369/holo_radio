name: holo_radio
description: HoloRadio Digital Modem - Full Functional Flutter Port
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Audio playback & recording
  audioplayers: ^6.0.0
  record: ^5.0.4
  # File operations
  path_provider: ^2.1.2
  file_picker: ^8.0.0+1
  share_plus: ^9.0.0
  # Crypto
  encrypt: ^5.0.3
  crypto: ^3.0.3
  # UI extras
  flutter_animate: ^4.5.0
  syncfusion_flutter_charts: ^26.1.35
  permission_handler: ^11.3.1
  # WAV file handling
  wav: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
